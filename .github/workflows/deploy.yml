name: Deploy to Droplet

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.DROPLET_HOST }}
                  username: root
                  key: ${{ secrets.DROPLET_SSH_KEY }}
                  script: |
                      set -ex

                      echo "== START DEPLOY =="

                      cd /root/saas-evepos-be

                      git fetch origin
                      git reset --hard origin/master

                      echo "== CLEAN INSTALL =="

                      rm -rf node_modules package-lock.json
                      npm install --prefer-offline --no-audit

                      echo "== RESTART PM2 =="

                      pm2 delete api-saas || true
                      pm2 start app.js --name api-saas

                      pm2 save

                      echo "== DONE =="
